  en: |-
    Require enabling Index folder size in Options → Indexes (enabled by default)
  zh: |-
    需在 选项 → 索引 中勾选 索引文件夹大小（默认勾选）
shell.inject_explorer:
  en: Explorer
  zh: 资源管理器
shell.size_no_alwayskb:
  en: Size column use automatic units
  zh: 大小列使用自动单位
shell.size_max_bar:
  en: Size column show bar graph
  zh: 大小列显示条形图
shell.link:
  en: "Features on this page can also be used independently: ib-shell"
  zh: 本页功能也可作为独立程序调用：ib-shell
